name: Release

# Builds and publishes a Windows release whenever you push a version tag like
# v1.0.1. electron-builder uploads the installer, the portable exe, and the
# latest.yml metadata that the in-app auto-updater reads.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write # required for electron-builder to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run publish:win
        env:
          # Token electron-builder uses to create/upload the GitHub Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Code signing. When these secrets are set, electron-builder signs the
          # installer automatically. When they are empty (the default), the build
          # runs unsigned (forceCodeSigning is false), so nothing breaks until you
          # add a certificate.
          #   WIN_CSC_LINK          base64-encoded .pfx, or a URL/path to it
          #   WIN_CSC_KEY_PASSWORD  the certificate's password
          CSC_LINK: ${{ secrets.WIN_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.WIN_CSC_KEY_PASSWORD }}
