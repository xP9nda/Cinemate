name: Release

# Builds and publishes a Windows release whenever you push a version tag like
# v1.0.1. electron-builder uploads the installer, the portable exe, and the
# latest.yml metadata that the in-app auto-updater reads.
on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write # required for electron-builder to create the GitHub Release

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # full history + tags so the changelog can diff against the previous release

      - name: Generate changelog
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        run: |
          TAG="${GITHUB_REF_NAME}"
          PREV_TAG=$(git describe --tags --abbrev=0 "${TAG}^" 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${TAG}"
          else
            RANGE="${TAG}"
          fi
          REPO_URL="${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}"
          {
            echo "## Changes"
            echo ""
            git log --no-merges --pretty=format:"- [\`%h\`](${REPO_URL}/commit/%H) %s" "$RANGE"
            echo ""
          } > CHANGELOG_RELEASE.md
          cat CHANGELOG_RELEASE.md

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and publish
        run: npm run publish:win
        env:
          # Token electron-builder uses to create/upload the GitHub Release.
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update release notes
        if: startsWith(github.ref, 'refs/tags/')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release edit "${GITHUB_REF_NAME}" --notes-file CHANGELOG_RELEASE.md
